<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 대시보드 - MyFirstApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin()">
    <div class="container" style="max-width: 800px;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <h1 style="margin-bottom: 0;">My Dashboard</h1>
            <button onclick="handleLogout()" class="btn btn-outline" style="width: auto; padding: 0.5rem 1rem; margin-top: 0;">로그아웃</button>
        </header>

        <main>
            <section class="animate-pop">
                <h2>환영합니다, <span id="dash-user-name">사용자</span>님!</h2>
                <p class="subtitle" style="text-align: left;">오늘의 소식을 확인해 보세요.</p>
            </section>

            <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
                <div class="card" style="background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border-color); box-shadow: var(--shadow);">
                    <h3>내 프로필</h3>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">회원 정보를 수정하거나 확인합니다.</p>
                </div>
                <div class="card" style="background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border-color); box-shadow: var(--shadow);">
                    <h3>새 소식</h3>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">새로운 공지사항과 업데이트를 확인하세요.</p>
                </div>
                <div class="card" style="background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border-color); box-shadow: var(--shadow);">
                    <h3>설정</h3>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">앱의 환경설정을 변경합니다.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
