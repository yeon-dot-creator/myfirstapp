<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 - Modern App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="displayUserInfo(); createConfetti();">
    <div id="confetti-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 9999;"></div>

    <div class="container animate-pop">
        <div class="animate-float" style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🎉</div>
        <h1 class="rainbow">환영합니다!</h1>
        <p class="subtitle" id="welcome-message">성공적으로 로그인하셨습니다.</p>
        
        <div class="user-info-card" style="margin-top: 2rem; padding: 1.5rem; background: #f8fafc; border-radius: 1rem; text-align: left;">
            <p><strong>이름:</strong> <span id="user-name">로딩 중...</span></p>
            <p><strong>이메일:</strong> <span id="user-email">로딩 중...</span></p>
        </div>

        <div class="nav-buttons" style="margin-top: 2rem;">
            <button onclick="handleLogout()" class="btn btn-outline" style="width: 100%; padding: 0.75rem; border-radius: 0.75rem; font-weight: 600; cursor: pointer;">로그아웃</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
