<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Modern App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">계정에 로그인하여 계속하세요.</p>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>
        
        <div class="footer-link">
            계정의 없으신가요? <span onclick="navigateTo('signup.html')" style="color: var(--primary-color); cursor: pointer; font-weight: 500; text-decoration: underline;">회원가입</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
